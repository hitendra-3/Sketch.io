<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <title>Sketch.io — draw together, live</title>
    <meta name="description" content="A real-time collaborative whiteboard. Open a room, share the link, draw together — every stroke syncs instantly over WebSockets." />

    </script>

    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
